<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}heli-tracker{% endblock %}</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: #111;
      color: #eee;
      line-height: 1.5;
    }
    header {
      background: #1a1a1a;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid #333;
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    header h1 {
      font-size: 1.1rem;
      margin: 0;
      color: #ffd166;
    }
    header nav a {
      color: #9ecaff;
      text-decoration: none;
      font-size: 0.95rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
    }
    header nav a:hover { background: #222; }
    header nav a.active { background: #2d4c7a; color: #fff; }
    main { padding: 1rem 1.25rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }
    th, td {
      text-align: left;
      padding: 0.5rem 0.6rem;
      border-bottom: 1px solid #2a2a2a;
    }
    th {
      color: #9c9c9c;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }
    tr:hover td { background: #1b1b1b; }
    .tag {
      display: inline-block;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      font-size: 0.72rem;
      background: #333;
      color: #ccc;
    }
    .tag.inferred { background: #664; color: #ffe89a; }
    .muted { color: #777; }
    .empty {
      padding: 2rem;
      text-align: center;
      color: #777;
      border: 1px dashed #333;
      border-radius: 8px;
    }
    .map-container { height: calc(100vh - 60px); width: 100%; }
    {% block extra_css %}{% endblock %}
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <h1>🚁 heli-tracker</h1>
    <nav>
      <a href="/" class="{% if active == 'flights' %}active{% endif %}">Voli</a>
      <a href="/map" class="{% if active == 'map' %}active{% endif %}">Mappa</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
