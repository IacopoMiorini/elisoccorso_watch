# Siti di atterraggio conosciuti (elisuperfici ospedaliere e basi HEMS).
#
# Al rilevamento di un atterraggio, lo script cerca il sito più vicino al punto
# di landing entro `radius_m` e lo cita nel messaggio Telegram. Se nessun sito
# matcha, il messaggio riporta solo lat/lon grezze.
#
# ATTENZIONE: le coordinate sotto sono stime ricavate da mappe pubbliche
# (livello 18 zoom Google/OSM) e vanno verificate con dati di volo reali.
# Quando vedi un atterraggio in un sito noto, aggiorna `lat`/`lon` con la
# media dei punti osservati + tieni `radius_m` fra 300 e 600 m.
#
# Campi per ogni voce:
#   name      : etichetta mostrata in Telegram (obbligatorio)
#   city      : città (facoltativo, va in parentesi)
#   lat/lon   : centro dell'elisuperficie in decimali
#   radius_m  : raggio di match in metri (default 500 se omesso)

sites:
